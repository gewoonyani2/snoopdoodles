<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Snoopdoodles - Afspraak Maken</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfaf7; color: #4a4a4a; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #d4a373; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #d4a373; color: white; border: none; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #bc8a5f; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Boek een Trimbeurt</h2>
        <form id="bookForm">
            <label>Beschikbare tijden</label>
            <select id="slotSelect" required><option>Laden...</option></select>
            
            <label>Naam baasje</label>
            <input type="text" id="firstName" required>
            
            <label>Naam hond</label>
            <input type="text" id="dogName" required>
            
            <label>Telefoonnummer</label>
            <input type="tel" id="phone" required>
            
            <label>E-mail</label>
            <input type="email" id="email" required>
            
            <button type="submit">Afspraak Bevestigen</button>
        </form>
    </div>

    <script>
        async function getSlots() {
            const res = await fetch('/api/slots');
            const slots = await res.json();
            const select = document.getElementById('slotSelect');
            select.innerHTML = slots.map(s => `<option value="${s.id}">${new Date(s.start_time).toLocaleString('nl-BE')}</option>`).join('');
        }

        document.getElementById('bookForm').onsubmit = async (e) => {
            e.preventDefault();
            const body = {
                slot_id: document.getElementById('slotSelect').value,
                first_name: document.getElementById('firstName').value,
                dog_name: document.getElementById('dogName').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value
            };
            const res = await fetch('/api/book', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if(res.ok) { alert('Afspraak staat in de agenda!'); location.reload(); }
        };
        getSlots();
    </script>
</body>
</html>
